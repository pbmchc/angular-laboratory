<div class="author-form">
  <form [formRoot]="authorForm">
    <div class="author-form-group">
      <input [formField]="authorForm.firstName" />
      <input [formField]="authorForm.lastName" />
      @for (error of authorForm().errors(); track error.kind) {
        <span class="author-form-error">{{ error.message }}</span>
      }
    </div>
    <button type="submit" [disabled]="!authorForm().valid()">
      @if (authorForm().pending()) {
        <ng-container i18n="@@author_form.button.checking">
          Checking...
        </ng-container>
      } @else {
        <ng-container i18n="@@author_form.button.save">Save</ng-container>
      }
    </button>
  </form>
</div>
